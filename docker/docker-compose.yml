version: '3.8'

services:
  # Nginx 负载均衡 + 反向代理
  nginx:
    image: nginx:alpine
    container_name: pclaw-nginx
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - pclaw-1
      - pclaw-2
    networks:
      - pclaw-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Pclaw 实例 1
  pclaw-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pclaw-1
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:password@postgres:5432/pclaw
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pclaw-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Pclaw 实例 2
  pclaw-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pclaw-2
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:password@postgres:5432/pclaw
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pclaw-net
    restart: unless-stopped

  # Redis (缓存 + 会话)
  redis:
    image: redis:7-alpine
    container_name: pclaw-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - pclaw-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: pclaw-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=pclaw
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pclaw-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  pclaw-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
