name: Deploy to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy website files to Aliyun
        env:
          HOST: ${{ secrets.ALIYUN_HOST }}
          USER: ${{ secrets.ALIYUN_SSH_USER }}
          KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          echo "$KEY" > ~/aliyun.pem
          chmod 600 ~/aliyun.pem
          echo "Deploying files..."
          scp -i ~/aliyun.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            website/*.html website/*.jpg \
            root@$HOST:/var/www/pclaw/
          echo "Files deployed"

      - name: Restart API (only if scaffold-api.js is running)
        env:
          HOST: ${{ secrets.ALIYUN_HOST }}
          KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          echo "$KEY" > ~/aliyun.pem
          chmod 600 ~/aliyun.pem
          ssh -i ~/aliyun.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            root@$HOST "ps aux | grep scaffold-api | grep -v grep && echo 'API running' || (cd /var/www/pclaw-api && node scaffold-api.js >> /tmp/scaffold.log 2>&1 &)"
