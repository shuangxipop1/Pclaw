name: Deploy to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy website files
        env:
          HOST: ${{ secrets.ALIYUN_HOST }}
          USER: ${{ secrets.ALIYUN_SSH_USER }}
          KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          echo "$KEY" > ~/aliyun.pem
          chmod 600 ~/aliyun.pem
          scp -i ~/aliyun.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            website/*.html website/*.jpg \
            root@$HOST:/var/www/pclaw/
          echo "Website deployed"

      - name: Deploy API files
        env:
          HOST: ${{ secrets.ALIYUN_HOST }}
          USER: ${{ secrets.ALIYUN_SSH_USER }}
          KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          echo "$KEY" > ~/aliyun.pem
          chmod 600 ~/aliyun.pem
          scp -i ~/aliyun.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            scaffold-api.js minimal.js payment_inline.js \
            root@$HOST:/var/www/pclaw-api/
          echo "API files deployed"

      - name: Restart API
        env:
          HOST: ${{ secrets.ALIYUN_HOST }}
          KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          echo "$KEY" > ~/aliyun.pem && chmod 600 ~/aliyun.pem
          ssh -i ~/aliyun.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 root@$HOST \
            "pkill -f 'node.*scaffold' 2>/dev/null || true; sleep 2; cd /var/www/pclaw-api; node scaffold-api.js >> /tmp/scaffold.log 2>&1 &"
          echo "API restart triggered"
