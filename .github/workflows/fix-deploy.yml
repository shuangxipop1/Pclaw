name: Fix Homepage Deploy
on: workflow_dispatch
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy new index.html as guide.html
        run: |
          cp website/index.html website/guide.html
      - name: Upload to server
        env:
          HOST: ${{ secrets.ALIYUN_HOST }}
          USER: ${{ secrets.ALIYUN_SSH_USER }}
          KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          echo "$KEY" > ~/aliyun.pem
          chmod 600 ~/aliyun.pem
          scp -i ~/aliyun.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 website/guide.html root@$HOST:/var/www/pclaw/guide.html
          scp -i ~/aliyun.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 website/index.html root@$HOST:/var/www/pclaw/index.html
          echo "Deployed"
