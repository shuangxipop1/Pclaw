version: '3.9'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  pg:
    image: postgres:15-alpine
    container_name: pclaw_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: pclaw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-pclaw123}
    volumes:
      - pclaw_pg_data:/var/lib/postgresql/data
      - ./scripts/init-pg.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - pclaw_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API Service (Node.js)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pclaw_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      PG_HOST: pg
      PG_PORT: 5432
      PG_DB: pclaw
      PG_USER: postgres
      PG_PASSWORD: ${PG_PASSWORD:-pclaw123}
      JWT_SECRET: ${JWT_SECRET:-claw-jwt-secret-change-in-production}
      # Fallback to host PG if needed
      USE_HOST_PG: "false"
    volumes:
      - ./scaffold-api.js:/app/scaffold-api.js:ro
      - /tmp/pclaw-data.json:/tmp/pclaw-data.json:rw
    depends_on:
      pg:
        condition: service_healthy
    networks:
      - pclaw_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/payment/packages || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ============================================
  # Frontend (nginx static site)
  # ============================================
  frontend:
    build:
      context: ./website
      dockerfile: ../Dockerfile.frontend
    container_name: pclaw_frontend
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pclaw_net
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  pclaw_net:
    driver: bridge

volumes:
  pclaw_pg_data:
    driver: local
