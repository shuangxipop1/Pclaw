<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>充值中心 - Pclaw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  min-height: 100vh;
}
.nav {
  background: #111;
  border-bottom: 1px solid #222;
  padding: 12px 24px;
  display: flex;
  gap: 20px;
  align-items: center;
}
.nav img { height: 32px; vertical-align: middle; }
.nav a { color: #888; font-size: 14px; text-decoration: none; }
.nav a:hover { color: #fff; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; color: #fff; }
.subtitle { color: #666; margin-bottom: 32px; }

.mock-banner {
  background: linear-gradient(135deg, #1a1500, #2d1f00);
  border: 1px solid #f59e0b;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: 14px;
  color: #f59e0b;
  display: flex;
  align-items: center;
  gap: 10px;
}
.mock-banner .tag {
  background: #f59e0b;
  color: #000;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}

.packages { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 32px; }
.pkg {
  background: #111;
  border: 2px solid #1e1e1e;
  border-radius: 16px;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
  position: relative;
}
.pkg:hover { border-color: #f59e0b; transform: translateY(-2px); }
.pkg.selected { border-color: #f59e0b; background: #1a1500; }
.pkg-badge {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  background: #f59e0b;
  color: #000;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.pkg-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.pkg-credits { font-size: 28px; font-weight: 800; color: #f59e0b; margin-bottom: 4px; }
.pkg-credits-label { font-size: 12px; color: #666; margin-bottom: 12px; }
.pkg-price { font-size: 20px; font-weight: 700; color: #fff; }
.pkg-bonus { font-size: 12px; color: #22c55e; margin-top: 4px; }
.pkg.selected .pkg-bonus { color: #4ade80; }

.pay-summary {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}
.pay-summary .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
.pay-summary .row:last-child { border-bottom: none; }
.pay-summary .label { color: #666; }
.pay-summary .value { font-weight: 700; color: #fff; }
.pay-summary .value.highlight { color: #f59e0b; font-size: 18px; }

.btn-pay {
  width: 100%;
  background: #f59e0b;
  color: #000;
  border: none;
  padding: 16px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
  margin-bottom: 16px;
}
.btn-pay:hover { background: #fbbf24; }
.btn-pay:disabled { background: #333; color: #666; cursor: not-allowed; }

.result-box {
  margin-top: 24px;
  padding: 24px;
  background: #111;
  border-radius: 12px;
  text-align: center;
  border: 1px solid #22c55e;
}
.result-box.success { border-color: #22c55e; }
.result-box .icon { font-size: 48px; margin-bottom: 12px; }
.result-box h3 { font-size: 20px; margin-bottom: 8px; color: #fff; }
.result-box p { color: #888; font-size: 14px; line-height: 1.6; }
.result-box .order-id { font-family: monospace; font-size: 12px; color: #666; margin-top: 8px; }

.loading {
  display: inline-block; width: 20px; height: 20px;
  border: 2px solid #0003; border-radius: 50%;
  border-top-color: #000; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html"><img src="logo.jpg" alt="Pclaw" height="32" style="vertical-align:middle"></a>
  <a href="dna-shop.html">知识商店</a>
  <a href="demand-plaza.html">需求广场</a>
  <a href="expo.html">数字展会</a>
  <a href="my-dna.html">我的分润</a>
  <a href="payment.html" style="color:#f59e0b">充值中心</a>
  <a href="console.html">控制台</a>
</nav>

<div class="container">
  <h1>💰 充值中心</h1>
  <p class="subtitle">选择套餐，一键充值，自动到账</p>

  <div class="mock-banner" id="mockBanner">
    <span class="tag">开发模式</span>
    <span>当前为 Mock 测试模式，充值立即到账。正式上线后自动接通微信/支付宝/Stripe。</span>
  </div>

  <!-- 充值套餐 -->
  <div class="packages" id="packages">
    <div style="text-align:center;color:#666;padding:40px">加载中...</div>
  </div>

  <!-- 充值确认 -->
  <div id="paySummary" style="display:none">
    <div class="pay-summary">
      <div class="row"><span class="label">充值套餐</span><span class="value" id="sPackage">—</span></div>
      <div class="row"><span class="label">到账 Credits</span><span class="value highlight" id="sCredits">—</span></div>
      <div class="row"><span class="label">支付金额</span><span class="value highlight" id="sAmount">—</span></div>
      <div class="row"><span class="label">支付方式</span><span class="value" id="sProvider">Mock测试</span></div>
    </div>
    <button class="btn-pay" id="payBtn" disabled onclick="handlePay()">请选择套餐</button>
  </div>

  <!-- 结果 -->
  <div id="resultBox" style="display:none"></div>
</div>

<script>
// ---------- 状态 ----------
let packages = [];
let selectedPkg = null;
let currentOrderId = null;
let isLoading = false;

// ---------- 初始化 ----------
async function init() {
  try {
    const r = await fetch('/api/payment/config');
    const cfg = await r.json();
    if (cfg.data?.providers?.mock) {
      document.getElementById('mockBanner').style.display = 'flex';
    }
  } catch(e) {}

  try {
    const r = await fetch('/api/payment/packages');
    const j = await r.json();
    packages = j.data?.packages || j.packages || [];
    renderPackages();
  } catch(e) {
    document.getElementById('packages').innerHTML = '<div style="text-align:center;color:#f59e0b;padding:40px">加载失败，请刷新重试</div>';
  }
}

function renderPackages() {
  const el = document.getElementById('packages');
  if (!packages.length) {
    el.innerHTML = '<div style="text-align:center;color:#666;padding:40px">暂无可用套餐</div>';
    return;
  }
  el.innerHTML = packages.map(pkg => {
    const badge = pkg.bonus > 0 ? `<div class="pkg-badge">赠${pkg.bonus}</div>` : '';
    const bonusLine = pkg.bonus > 0 ? `<div class="pkg-bonus">含赠${pkg.bonus} Credits</div>` : '';
    return `<div class="pkg" data-id="${pkg.id}" onclick="selectPkg('${pkg.id}')">
      ${badge}
      <div class="pkg-name">${pkg.name}</div>
      <div class="pkg-credits">${pkg.credits}</div>
      <div class="pkg-credits-label">Credits</div>
      ${bonusLine}
      <div class="pkg-price">¥${pkg.price}</div>
    </div>`;
  }).join('');
}

function selectPkg(id) {
  selectedPkg = packages.find(p => p.id === id);
  document.querySelectorAll('.pkg').forEach(el => el.classList.remove('selected'));
  document.querySelector(`.pkg[data-id="${id}"]`)?.classList.add('selected');
  showSummary();
}

function showSummary() {
  if (!selectedPkg) return;
  document.getElementById('sPackage').textContent = `${selectedPkg.name} (${selectedPkg.credits} Credits)`;
  document.getElementById('sCredits').textContent = `${selectedPkg.credits + (selectedPkg.bonus||0)} Credits`;
  document.getElementById('sAmount').textContent = `¥${selectedPkg.price}`;
  document.getElementById('paySummary').style.display = 'block';
  document.getElementById('resultBox').style.display = 'none';
  const btn = document.getElementById('payBtn');
  btn.disabled = false;
  btn.textContent = `立即充值 ¥${selectedPkg.price}`;
}

// ---------- 充值流程 ----------
async function handlePay() {
  if (!selectedPkg || isLoading) return;
  isLoading = true;
  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> 充值中...';

  try {
    // 步骤1: 创建订单 (mock/charge 直接充值，跳过中间环节)
    const res = await fetch('/api/payment/mock/charge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: getUserId(),
        packageId: selectedPkg.id,
      }),
    });
    const j = await res.json();
    if (!res.ok || !j.success) {
      throw new Error(j.error || '充值失败');
    }

    const data = j.data || j;
    currentOrderId = data.orderId;

    // 步骤2: 显示成功
    showSuccess(data);

  } catch(e) {
    document.getElementById('resultBox').innerHTML = `<div class="result-box" style="border-color:#ef4444">
      <div class="icon">❌</div>
      <h3>充值失败</h3>
      <p>${e.message}</p>
    </div>`;
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('paySummary').style.display = 'none';
    btn.disabled = false;
    btn.textContent = `立即充值 ¥${selectedPkg.price}`;
    isLoading = false;
  }
}

function showSuccess(data) {
  document.getElementById('paySummary').style.display = 'none';
  document.getElementById('resultBox').innerHTML = `
    <div class="result-box success">
      <div class="icon">🎉</div>
      <h3>充值成功！</h3>
      <p><strong>${data.credits || selectedPkg.credits} Credits</strong> 已到账</p>
      <p style="margin-top:8px">¥${data.amount || selectedPkg.price} · 订单号：${currentOrderId}</p>
      <div class="order-id">${data.mock ? '· Mock测试模式' : ''}</div>
      <p style="margin-top:16px"><a href="console.html" style="color:#f59e0b">去控制台使用 →</a></p>
    </div>
  `;
  document.getElementById('resultBox').style.display = 'block';
  isLoading = false;
}

// ---------- 用户ID（本地生成或从localStorage读取）----------
function getUserId() {
  let uid = localStorage.getItem('pclaw_uid');
  if (!uid) {
    uid = 'user_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6);
    localStorage.setItem('pclaw_uid', uid);
  }
  return uid;
}

init();
</script>
</body>
</html>
