<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的分润 - Pclaw 寻源引擎</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .nav { background: #111; border-bottom: 1px solid #222; padding: 12px 24px; display: flex; gap: 24px; }
    .nav a { color: #888; text-decoration: none; font-size: 14px; }
    .nav a:hover, .nav a.active { color: #fff; }
    .nav .logo { font-weight: 700; font-size: 18px; color: #fff; margin-right: auto; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 16px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 700; color: #f59e0b; margin-bottom: 4px; }
    .stat-label { color: #666; font-size: 13px; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .earnings-list { display: flex; flex-direction: column; gap: 12px; }
    .earning-card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
    .earning-info h4 { font-size: 14px; margin-bottom: 4px; }
    .earning-info p { color: #666; font-size: 12px; }
    .earning-amount { text-align: right; }
    .earning-amount .amount { font-size: 18px; font-weight: 700; color: #f59e0b; }
    .earning-amount .role { color: #666; font-size: 12px; }
    .earning-amount .time { color: #444; font-size: 11px; }
    .empty { text-align: center; color: #555; padding: 60px 0; }
    .login-prompt { background: #111; border: 1px solid #222; border-radius: 12px; padding: 40px; text-align: center; }
    .login-prompt h3 { margin-bottom: 12px; }
    .login-prompt p { color: #666; margin-bottom: 20px; }
    .login-btn { background: #f59e0b; color: #000; border: none; padding: 12px 32px; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
    .login-btn:hover { background: #fbbf24; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html"><img src="logo.jpg" alt="Pclaw" height="32" style="vertical-align:middle"></a>
    <a href="index.html">首页</a>
    <a href="dna-shop.html">知识商店</a>
    <a href="demand-plaza.html">需求广场</a>
    <a href="expo.html">数字展会</a>
    <a href="my-dna.html" class="active">我的分润</a>
    <a href="console.html">控制台</a>
<a href="payment.html">充值中心</a>
  </nav>
  <div class="container">
    <h1>我的分润</h1>
    <p class="subtitle">每一次匹配成功，自动分润。躺赚30%需求方收益。</p>
    <div id="loggedInContent" style="display:none;">
      <div class="stats">
        <div class="stat"><div class="stat-value" id="totalEarnings">¥0</div><div class="stat-label">累计收益</div></div>
        <div class="stat"><div class="stat-value" id="demandEarnings">¥0</div><div class="stat-label">需求方(躺赚30%)</div></div>
        <div class="stat"><div class="stat-value" id="resourceEarnings">¥0</div><div class="stat-label">资源方(40%)</div></div>
        <div class="stat"><div class="stat-value" id="pendingEarnings">¥0</div><div class="stat-label">待结算</div></div>
      </div>
      <h3 class="section-title">近期分润记录</h3>
      <div class="earnings-list" id="earningsList"><div class="empty">暂无分润记录</div></div>
    </div>
    <div id="loginPrompt" class="login-prompt">
      <h3>登录后查看分润</h3>
      <p>登录后查看你的分润收益和历史记录</p>
      <a href="login.html" class="login-btn">登录 / 注册</a>
    </div>
  </div>
  <script>
    const API = 'https://www.pclawai.com/api';
    const user = JSON.parse(localStorage.getItem('pclaw_user') || '{}');
    if (user.user_id) {
      document.getElementById('loggedInContent').style.display = 'block';
      document.getElementById('loginPrompt').style.display = 'none';
      loadEarnings();
    }
    async function loadEarnings() {
      try {
        const res = await fetch(`${API}/earnings/list?user_id=${user.user_id}`);
        const data = await res.json();
        if (!data.earnings || data.earnings.length === 0) return;
        let total = 0, demand = 0, resource = 0, pending = 0;
        data.earnings.forEach(e => {
          total += e.amount || 0;
          if (e.role === 'demand') demand += e.amount || 0;
          else if (e.role === 'resource') resource += e.amount || 0;
          if (e.status === 'pending') pending += e.amount || 0;
        });
        document.getElementById('totalEarnings').textContent = `¥${total.toFixed(2)}`;
        document.getElementById('demandEarnings').textContent = `¥${demand.toFixed(2)}`;
        document.getElementById('resourceEarnings').textContent = `¥${resource.toFixed(2)}`;
        document.getElementById('pendingEarnings').textContent = `¥${pending.toFixed(2)}`;
        document.getElementById('earningsList').innerHTML = data.earnings.map(e => `
          <div class="earning-card">
            <div class="earning-info"><h4>${e.title || '分润'}</h4><p>${e.type === 'skill' ? '技能' : e.type === 'service' ? '服务' : '其他'}</p></div>
            <div class="earning-amount">
              <div class="amount">+¥${(e.amount || 0).toFixed(2)}</div>
              <div class="role">${e.role === 'demand' ? '需求方30%' : '资源方40%'}</div>
              <div class="time">${e.created_at || ''}</div>
            </div>
          </div>
        `).join('');
      } catch (e) { /* silent fail */ }
    }
  </script>
</body>
</html>
