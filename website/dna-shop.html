<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识商店 - Pclaw 寻源引擎</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .nav { background: #111; border-bottom: 1px solid #222; padding: 12px 24px; display: flex; gap: 24px; align-items: center; }
    .nav a { color: #888; text-decoration: none; font-size: 14px; }
    .nav a:hover, .nav a.active { color: #fff; }
    .nav .logo { font-weight: 700; font-size: 18px; color: #fff; margin-right: auto; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 16px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; }
    .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    .filter.active { background: #f59e0b; color: #000; border-color: #f59e0b; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
    .card:hover { border-color: #f59e0b; }
    .card-img { height: 120px; background: linear-gradient(135deg, #1a1a1a, #222); display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .card-body { padding: 16px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .card-meta { display: flex; justify-content: space-between; color: #666; font-size: 12px; margin-bottom: 12px; }
    .card-price { color: #f59e0b; font-size: 18px; font-weight: 700; }
    .card-price span { font-size: 12px; color: #666; font-weight: 400; }
    .empty { text-align: center; color: #555; padding: 60px 0; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html"><img src="logo.jpg" alt="Pclaw" height="32" style="vertical-align:middle"></a>
    <a href="index.html">首页</a>
    <a href="dna-shop.html" class="active">知识商店</a>
    <a href="demand-plaza.html">需求广场</a>
    <a href="expo.html">数字展会</a>
    <a href="my-dna.html">我的分润</a>
    <a href="console.html">控制台</a>
<a href="payment.html">充值中心</a>
  </nav>
  <div class="container">
    <h1>知识商店</h1>
    <p class="subtitle">汇聚各行业专业知识技能，即买即用。资源方获得40%销售分成。</p>
    <div class="filters">
      <span class="filter active" data-type="all">全部</span>
      <span class="filter" data-type="skill">技能</span>
      <span class="filter" data-type="service">服务</span>
      <span class="filter" data-type="material">材料</span>
      <span class="filter" data-type="equipment">设备</span>
      <span class="filter" data-type="human">人力</span>
      <span class="filter" data-type="digital">数字</span>
    </div>
    <div class="grid" id="skillGrid"><div class="empty">加载中...</div></div>
  </div>
  <script>
    const API = 'https://www.pclawai.com/api';
    async function loadSkills(type) {
      try {
        const res = await fetch(`${API}/skill/list`);
        const data = await res.json();
        if (!data.skills || data.skills.length === 0) {
          document.getElementById('skillGrid').innerHTML = '<div class="empty">暂无技能，<a href="console.html" style="color:#f59e0b">成为第一个创作者</a></div>';
          return;
        }
        const filtered = type === 'all' ? data.skills : data.skills.filter(s => s.type === type);
        document.getElementById('skillGrid').innerHTML = filtered.map(s => `
          <div class="card">
            <div class="card-img">🧬</div>
            <div class="card-body">
              <div class="card-title">${s.name}</div>
              <div class="card-meta"><span>${s.category || s.type}</span><span>${s.sales_count || 0}次使用</span></div>
              <div class="card-price">¥${s.price || 0}<span>/${s.unit || '次'}</span></div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('skillGrid').innerHTML = '<div class="empty">加载失败</div>';
      }
    }
    document.querySelectorAll('.filter').forEach(f => {
      f.onclick = () => {
        document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
        f.classList.add('active');
        loadSkills(f.dataset.type);
      };
    });
    loadSkills('all');
  </script>
</body>
</html>
